<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Crack Lokshewa</title>
    <script>
        // GitHub Pages SPA redirect: preserve the path in the hash
        var path = window.location.pathname;
        var repo = '/crack-lokshewa';
        if (path.indexOf(repo) === 0) {
            path = path.slice(repo.length);
        }
        if (path && path !== '/') {
            window.location.replace(repo + '/#' + path);
        } else {
            window.location.replace(repo + '/');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
