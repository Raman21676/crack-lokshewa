<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Page Not Found — Crack Lokshewa</title>
    <meta name="robots" content="noindex, follow">
    <script>
        // SPA redirect: preserve the path in the hash for GitHub Pages
        var path = window.location.pathname;
        var repo = '/crack-lokshewa';
        if (path.indexOf(repo) === 0) {
            path = path.slice(repo.length);
        }
        if (path && path !== '/') {
            window.location.replace('/#' + path);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body>
    <p>Redirecting to the correct page…</p>
</body>
</html>
